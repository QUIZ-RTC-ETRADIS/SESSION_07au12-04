function envoyerResultatReel(etudiant, slide) {
    var nom = etudiant.name();       // Nom de l'étudiant
    var email = etudiant.email();    // Email de l'étudiant
    var score = slide.awardedScore(); // Score obtenu
    var reponses = slide.result();   // Correct / Incorrect / Neutral

    emailjs.send("service_lwi7p29", "template_x47y2fl", {
        student_name: nom,
        student_email: email,
        quiz_score: score,
        quiz_answers: reponses
    })
    .then(function(response) {
       console.log("Email envoyé !", response.status, response.text);
    }, function(error) {
       console.log("Erreur d'envoi : ", error);
    });
}
